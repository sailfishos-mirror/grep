bootstrap_post_import_hook ()
{
  # Automake requires that ChangeLog exist.
  touch ChangeLog || return 1

  # Copy tests/init.sh from Gnulib.
  $gnulib_tool --copy-file tests/init.sh

  # grep is single-threaded.
  # Copy lib/glthread/lock.h from Gnulib, sans the lock module.
  $gnulib_tool --copy-file lib/glthread/lock.h

  # For an unknown reason the bootstrap script can override Gnulib with
  # files from places like /usr/share/gettext/m4.
  # However, this seems to be harmless if your gettext is new enough
  # so do not worry about it here.

  # Copy pkg-config's pkg.m4 so that our downstream users don't need to.
  local ac_dir=`aclocal --print-ac-dir`
  test -s "$ac_dir/dirlist" && ac_dir=$ac_dir:`tr '\n' : < "$ac_dir/dirlist"`
  oIFS=$IFS
  IFS=:
  local found=false
  for dir in \
    $ACLOCAL_PATH $ac_dir /usr/share/aclocal ''
  do
    IFS=$oIFS
    if test -n "$dir" && test -r "$dir/pkg.m4"; then
      cp "$dir/pkg.m4" m4/pkg.m4
      found=:
      break
    fi
  done
  IFS=$oIFS
  $found || die 'Cannot find pkg.m4; perhaps you need to install pkg-config'
}

bootstrap_epilogue()
{
  perl -pi -e "s/\@PACKAGE\@/$package/g" README-release

  # Since this is a "GNU" package, replace this line
  #   if LC_ALL=C grep 'GNU @PACKAGE@' $(top_srcdir)/* 2>/dev/null \
  #      | grep -v 'libtool:' >/dev/null; then
  # with this:
  #   if true; then
  # Why?  That pipeline searches all files in $(top_srcdir), and if you
  # happen to have large files (or apparently large sparse files), the
  # first grep may well run out of memory.
  perl -pi -e 's/if LC_ALL=C grep .GNU .PACKAGE.*; then/if true; then/' \
    po/Makefile.in.in
}
